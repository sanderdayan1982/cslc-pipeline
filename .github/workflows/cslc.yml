name: CSLC pipeline (daily)

# Runs the three CSLC fetchers once a day and commits the updated CSVs.
on:
  schedule:
    - cron: "30 0 * * *"   # 00:30 UTC daily
  workflow_dispatch: {}     # manual run button in the Actions tab

permissions:
  contents: write           # to commit refreshed CSVs back to the repo

concurrency:
  group: cslc-daily
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # No pip install: all fetchers are stdlib-only.

      - name: Funding / OI (Bybit/OKX/Deribit/Hyperliquid -> CEFDI/OFPR)
        run: python fetchers/funding_oi.py

      - name: Stablecoins (DefiLlama -> SIVI)
        run: python fetchers/stablecoins.py

      - name: On-chain (CoinMetrics -> MVRV-Z)
        run: python fetchers/onchain.py

      - name: Commit updated CSVs
        run: |
          git config user.name  "cslc-bot"
          git config user.email "cslc-bot@users.noreply.github.com"
          git add data/funding_oi.csv data/stablecoins.csv data/onchain.csv
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: pipeline update $(date -u +%Y-%m-%d)"
            git push
          fi
